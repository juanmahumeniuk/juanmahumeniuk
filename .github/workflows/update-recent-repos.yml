name: Update recent repositories

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and patch recent repos
        env:
          GH_USER: juanmahumeniuk
        run: |
          python3 <<'PY'
          import json
          import re
          import urllib.request

          url = f"https://api.github.com/users/{__import__('os').environ['GH_USER']}/repos?sort=pushed&per_page=6"
          req = urllib.request.Request(url, headers={"Accept": "application/vnd.github+json"})
          repos = json.load(urllib.request.urlopen(req))

          lines = [
              "<!-- RECENT_REPOS:START -->",
              "",
              "### Últimos repos actualizados",
              "",
              "| Repo | Lenguaje | Último push |",
              "| ---- | -------- | ----------- |",
          ]

          for repo in repos:
              if repo["name"] == __import__("os").environ["GH_USER"]:
                  continue
              name = repo["name"]
              lang = repo.get("language") or "—"
              pushed = (repo.get("pushed_at") or "")[:10]
              desc = (repo.get("description") or "Sin descripción").replace("|", "/")
              lines.append(
                  f"| [{name}]({repo['html_url']}) | `{lang}` | {pushed} |"
              )

          lines.extend(["", "<!-- RECENT_REPOS:END -->", ""])
          block = "\n".join(lines)

          readme = open("README.md", encoding="utf-8").read()
          pattern = r"<!-- RECENT_REPOS:START -->.*?<!-- RECENT_REPOS:END -->"
          if not re.search(pattern, readme, flags=re.S):
              raise SystemExit("Markers not found in README.md")
          updated = re.sub(pattern, block.strip(), readme, count=1, flags=re.S)
          open("README.md", "w", encoding="utf-8").write(updated)
          PY

      - name: Commit if changed
        run: |
          if git diff --quiet README.md; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update recent repositories table"
          git push
